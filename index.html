<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Escape-time fractals</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0c0c0f;
        --panel: rgba(20, 20, 28, 0.92);
        --text: #e8e8ef;
        --muted: #9898a8;
        --accent: #6eb5ff;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
        font-family: system-ui, "Segoe UI", Roboto, sans-serif;
        color: var(--text);
      }
      .layout {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: flex-start;
        gap: 20px;
        padding: 20px;
      }
      #canvas {
        display: block;
        width: 1000px;
        height: 1000px;
        max-width: calc(100vw - 40px);
        max-height: calc(100vw - 40px);
        aspect-ratio: 1;
        cursor: crosshair;
        touch-action: none;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.45);
      }
      #hud {
        padding: 12px 14px;
        border-radius: 10px;
        background: var(--panel);
        backdrop-filter: blur(8px);
        width: min(320px, 100%);
        font-size: 13px;
        line-height: 1.45;
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      #hud h1 {
        margin: 0 0 8px;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.02em;
      }
      #hud label {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 8px;
        color: var(--muted);
      }
      #hud select,
      #hud input[type="range"] {
        flex: 1;
        min-width: 0;
      }
      #hud .hint {
        margin-top: 10px;
        font-size: 11px;
        color: var(--muted);
      }
      #nextPreset {
        margin-top: 10px;
        width: 100%;
        padding: 8px 12px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        background: rgba(110, 181, 255, 0.15);
        color: var(--accent);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
      }
      #nextPreset:hover {
        background: rgba(110, 181, 255, 0.25);
      }
      #nextPreset:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      #status {
        margin-top: 8px;
        font-size: 11px;
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <canvas id="canvas" width="1000" height="1000" aria-label="Fractal view"></canvas>
      <div id="hud">
        <h1>Escape-time fractals</h1>
        <label>
          Fractal
          <select id="fractal" title="Fractal family">
            <option value="0">Mandelbrot</option>
            <option value="1">Julia</option>
            <option value="2">Burning Ship</option>
            <option value="3">Tricorn</option>
          </select>
        </label>
        <label>
          Max iterations <span id="iterLabel"></span>
          <input id="maxIter" type="range" min="32" max="2048" step="32" value="512" />
        </label>
        <div id="juliaPanel" hidden>
          <label>
            Julia Re <span id="juliaReLabel"></span>
            <input id="juliaRe" type="range" min="-2000" max="2000" step="1" value="-727" />
          </label>
          <label>
            Julia Im <span id="juliaImLabel"></span>
            <input id="juliaIm" type="range" min="-2000" max="2000" step="1" value="189" />
          </label>
        </div>
        <button type="button" id="nextPreset">Next preset</button>
        <div class="hint">
          Click and drag on the image to draw a square. The region inside becomes the next view (animated). Presets cycle classic locations per fractal.
        </div>
        <div id="status"></div>
      </div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
