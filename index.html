<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Escape-time fractals</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0c0c0f;
        --panel: rgba(20, 20, 28, 0.92);
        --text: #e8e8ef;
        --muted: #9898a8;
        --accent: #6eb5ff;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        min-height: 100%;
        background: var(--bg);
        font-family: system-ui, "Segoe UI", Roboto, sans-serif;
        color: var(--text);
      }
      .layout {
        display: flex;
        flex-direction: row;
        align-items: stretch;
        gap: 12px;
        min-height: 100dvh;
        height: 100dvh;
        padding: 8px;
        box-sizing: border-box;
      }
      .canvas-stack {
        position: relative;
        flex: 1 1 auto;
        min-width: 0;
        min-height: 0;
        width: auto;
        height: auto;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.45);
      }
      .canvas-stack canvas {
        display: block;
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
      }
      #canvas {
        z-index: 0;
        pointer-events: none;
      }
      #canvasUi {
        z-index: 1;
        cursor: crosshair;
        touch-action: none;
        pointer-events: auto;
      }
      #hud {
        flex: 0 0 300px;
        width: 300px;
        max-width: 100%;
        padding: 12px 14px;
        border-radius: 10px;
        background: var(--panel);
        backdrop-filter: blur(8px);
        font-size: 13px;
        line-height: 1.45;
        border: 1px solid rgba(255, 255, 255, 0.08);
        overflow-y: auto;
        align-self: stretch;
      }
      #hud h1 {
        margin: 0 0 8px;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.02em;
      }
      #hud label {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 8px;
        color: var(--muted);
      }
      #hud select,
      #hud input[type="range"],
      #hud input[type="number"] {
        flex: 1;
        min-width: 0;
      }
      #hud .hint {
        margin-top: 10px;
        font-size: 11px;
        color: var(--muted);
      }
      .hudBtn {
        margin-top: 10px;
        width: 100%;
        padding: 8px 12px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
      }
      #nextPreset {
        border: 1px solid rgba(255, 255, 255, 0.15);
        background: rgba(110, 181, 255, 0.15);
        color: var(--accent);
      }
      #nextPreset:hover {
        background: rgba(110, 181, 255, 0.25);
      }
      #nextPreset:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      #resetView {
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
      }
      #resetView:hover {
        background: rgba(255, 255, 255, 0.1);
      }
      #status {
        margin-top: 8px;
        font-size: 11px;
        color: var(--accent);
      }
      @media (max-width: 720px) {
        .layout {
          flex-direction: column;
          height: auto;
          min-height: 100dvh;
        }
        #hud {
          flex: 0 0 auto;
          width: 100%;
          max-height: 45dvh;
        }
        .canvas-stack {
          flex: 1 1 50dvh;
          min-height: 40dvh;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <div class="canvas-stack">
        <canvas id="canvas" width="4" height="4" aria-label="Fractal view (WebGPU)"></canvas>
        <canvas id="canvasUi" width="4" height="4" aria-hidden="true"></canvas>
      </div>
      <div id="hud">
        <h1>Escape-time fractals</h1>
        <label>
          Fractal
          <select id="fractal" title="Fractal family">
            <option value="0">Mandelbrot</option>
            <option value="1">Julia</option>
            <option value="2">Burning Ship</option>
          </select>
        </label>
        <label>
          Max iter <span id="iterLabel"></span>
          <input id="maxIter" type="number" min="32" max="8192" step="1" value="1024" />
        </label>
        <label>
          Palette
          <select id="palette" title="Color mapping (same math, different look)">
            <option value="0">Nebula</option>
            <option value="1">Flotilla (sea &amp; fire)</option>
            <option value="2">Classic</option>
            <option value="3">Grayscale</option>
            <option value="4">Ghost ship</option>
          </select>
        </label>
        <div id="juliaPanel" hidden>
          <label>
            Julia Re <span id="juliaReLabel"></span>
            <input id="juliaRe" type="range" min="-2000" max="2000" step="1" value="-727" />
          </label>
          <label>
            Julia Im <span id="juliaImLabel"></span>
            <input id="juliaIm" type="range" min="-2000" max="2000" step="1" value="189" />
          </label>
        </div>
        <button type="button" class="hudBtn" id="nextPreset">Next preset</button>
        <button type="button" class="hudBtn" id="resetView">Reset view</button>
        <div class="hint">
          WebGPU for moderate zoom; past a half-width cutoff all fractals use WASM f64 mapping (Mandelbrot: tiled f64 perturb). Drag to box-zoom; arrows/WASD pan; +/− zoom (hold). Julia c, max iter, and palette update the image as you change them.
        </div>
        <div id="status"></div>
      </div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
